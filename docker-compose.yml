services:
  app:
    build: .
    command:
      - uvicorn
      - src.main:app
      - --host
      - 0.0.0.0
      - --forwarded-allow-ips=127.0.0.1
    ports:
      - "127.0.0.1:8001:8000"

    env_file:
      - .env
    
    environment:
      - PYTHONPATH=/app/src

    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data:
    driver: local
